name: CI — Lint & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linter
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ scripts/ tests/ --output-format=github

  test-structure:
    name: Validate Repo Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run structure tests
        run: pytest tests/test_structure.py tests/test_config.py -v

  test-syntax:
    name: Validate Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ultralytics opencv-python-headless onnx pyyaml matplotlib seaborn

      - name: Check syntax of all Python files
        run: python -m py_compile src/*.py && python -m py_compile scripts/*.py
